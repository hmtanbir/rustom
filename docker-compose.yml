name: 'rustom'

services:
  postgres:
    image: hmtanbir/postgres:latest
    container_name: rustom-postgres
    command:
      - "-c"
      - "listen_addresses=*"
      - "-c"
      - "shared_buffers=64MB"
      - "-c"
      - "work_mem=2MB"
      - "-c"
      - "maintenance_work_mem=16MB"
      - "-c"
      - "effective_cache_size=128MB"
      - "-c"
      - "max_connections=20"
    ports:
      - "127.0.0.1:5432:5432" 
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    read_only: true
    tmpfs:
      - /tmp
      - /var/run/postgresql
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: 2.0
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  redis:
    image: hmtanbir/dragonfly:latest
    container_name: rustom-redis
    command: ["--logtostderr", "--dir=/data"]
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "6379"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: 2.0
          memory: 2G
        reservations:
          cpus: 1.0
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  rabbitmq:
    image: hmtanbir/rabbitmq:latest
    container_name: rustom-rabbitmq
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD:-guest}
      - RABBITMQ_ERLANG_COOKIE=${RABBITMQ_ERLANG_COOKIE:-secureCookie456}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 10s
      retries: 5
    read_only: true
    tmpfs:
      - /tmp
      - /var/run/rabbitmq
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true  
    deploy:
      resources:
        limits:
          cpus: 2.0
          memory: 1G
        reservations:
          cpus: 1.0
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  api:
    image: hmtanbir/rustom:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rustom-api
    restart: unless-stopped
    ports:
      - "${PORT}:3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_SSL_ENABLED=off
      - REDIS_HOST=redis
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: 1.0
          memory: 256M
        reservations:
          cpus: 0.5
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
networks:
  default:
    name: rustom
    driver: bridge
